# === qa-bench-ci.yml 末尾新增 verification step (可选, 用于 A/B 测试) ===

      # === W68 第 3 批 B-2 verification step (可选) ===
      # 打印 cache hit rate 关键指标, 5 次跑统计基线
      - name: "Verify cache hit rate (W68 B-2 verification)"
        if: always()
        run: |
          echo "=== [1] Docker image layer cache ==="
          docker images app-test:ci --format "table {{.ID}}\t{{.Size}}\t{{.CreatedAt}}"

          echo "=== [2] Python __pycache__ size ==="
          docker exec app-test du -sh /root/.cache 2>/dev/null || echo "no __pycache__ mounted"

          echo "=== [3] Lazy models cache ==="
          docker exec app-test ls -lah /root/.cache/torch 2>/dev/null || echo "no torch cache"
          docker exec app-test ls -lah /root/.cache/huggingface 2>/dev/null || echo "no hf cache"

          echo "=== [4] Total CI wall clock (从 Cache restore 到 uvicorn ready) ==="
          # 简化: 让 prewarm step 自己打印, 这里只 echo 提示
          echo "Wall clock 详见上方各 step 耗时 + Actions UI workflow timing"

# === 部署/回退指南 ===

# 部署步骤:
# 1. 主指挥拍板选项 (A: 路径 1 单独 / B: 路径 3+1 组合 / C: 维持占位)
# 2. 拍板后由 W68 Route-B-2 Agent 把 patch 合并到 .github/workflows/qa-bench-ci.yml + build-image.yml
# 3. push commit → GitHub Actions 自动跑新 workflow
# 4. 5 次连续跑统计 cache hit rate + 时间节省
# 5. 若 hit rate < 70% 或单次跑仍 timeout → 回退 git revert (一行撤销)

# 回退步骤:
# git revert <commit-hash>   # 一行撤销
# git push origin main       # 自动跑旧 workflow

# 风险监控:
# - Actions UI → Insights → Cache storage 用量 > 5 GB 时手动清理
# - Actions UI → Workflow runs → qa-bench-ci.yml 连续 3 次 timeout 立即回退
# - Settings → Billing → Packages 配额 > 80% 立即降级 mode=max → mode=min