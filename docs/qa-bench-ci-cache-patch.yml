# W68 第 3 批路线 B-2 候选 workflow patch — qa-bench-ci cache 深度优化
#
# ⚠️ 这是设计文档, 不直接生效! 主指挥拍板后才合并到 .github/workflows/qa-bench-ci.yml
#
# 配套设计文档: docs/qa-bench-ghcr-cache-design.md
# 配套 memory: memory/w68-route-b2-ghcr-cache-design-2026-07-24.md
#
# 改动范围:
# - build-image.yml: 加 cache-scope + 升级 docker/build-push-action v5 → v6 + 关 attestation
# - qa-bench-ci.yml: 修 /tmp/.buildx-cache → ~/.cache/buildx + 加 /root/.cache 等模型路径
#                   + cache key hash 增 router 源码 + 加 Pre-warm step + pycache-vol mount
#
# 0 production code 改动铁律维持 — 仅 .github/workflows/ + 不动 app/ web/ alembic/

# === build-image.yml 改动 patch (替换 line 37-54) ===

# 原内容 (line 37-54):
#       - name: Set up Docker Buildx
#         uses: docker/setup-buildx-action@v3
#
#       - name: Login to GitHub Container Registry
#         uses: docker/login-action@v3
#         with:
#           registry: ghcr.io
#           username: ${{ github.actor }}
#           password: ${{ secrets.GITHUB_TOKEN }}
#
#       - name: Build and push
#         uses: docker/build-push-action@v5
#         with:
#           context: .
#           push: true
#           tags: ghcr.io/${{ github.repository_owner }}/microbubble-agent:app-test-latest
#           cache-from: type=gha
#           cache-to: type=gha,mode=max

# 新内容 (W68 B-2):
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # W68 第 3 批 B-2: 显式 cache-scope 防 namespace 碰撞
        with:
          # cache-scope 默认写入 buildx cache storage, 不需要在 driver-opts 配
          buildkitd-config: |
            [registry."ghcr.io"]
              mirrors = []

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (W68 B-2: cache-scope + v6 + provenance off)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/microbubble-agent:app-test-latest
          # W68 B-2 关键改动: cache-scope 防 PR/preview deployment 互相覆盖 cache
          # cache-from mode=max 让 pull 端能复用 push 端上传的所有中间 layer
          cache-from: type=gha,scope=app-test-image-v1,mode=max
          cache-to: type=gha,scope=app-test-image-v1,mode=max
          # 关掉 SBOM + provenance attestation, 节省 push 时间 1-2 s
          provenance: false
          sbom: false

# === qa-bench-ci.yml 改动 patch (替换 line 38-47 Cache pip step) ===

# 原内容 (line 38-47):
#       - name: Cache pip + Docker layers + apt
#         uses: actions/cache@v4
#         with:
#           path: |
#             ~/.cache/pip
#             /tmp/.buildx-cache
#             /var/cache/apt/archives
#           key: ${{ runner.os }}-multi-${{ hashFiles('requirements.txt', 'Dockerfile', 'app/requirements.txt') }}
#           restore-keys: |
#             ${{ runner.os }}-multi-

# 新内容 (W68 B-2):
      - name: Cache pip + Docker layers + __pycache__ + models + apt (W68 B-2 修复)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/buildx                            # W68 B-2: 修正 /tmp/.buildx-cache → ~/.cache/buildx (buildx 默认路径)
            /root/.cache                               # W68 B-2: Python __pycache__ + urllib3 cache
            /root/.cache/torch                         # W68 B-2: Whisper / ERes2Net 模型 (hub download)
            /root/.cache/huggingface                   # W68 B-2: text2vec-base-chinese embedding 模型
            /var/cache/apt/archives
          # W68 B-2: cache key 严格 hash 24 个 router __init__.py + agent/tools/*
          # 改源码 → key 自动 invalidate → 避免 stale __pycache__ + 新 source 不一致
          key: ${{ runner.os }}-multi-v2-${{ hashFiles('requirements.txt', 'Dockerfile', 'app/requirements.txt', 'tests/qa-bench/requirements.txt', 'app/api/v1/__init__.py', 'app/agent/__init__.py', 'app/agent/tools/__init__.py') }}
          restore-keys: |
            ${{ runner.os }}-multi-v2-

# === qa-bench-ci.yml 新增 step (在 Pull pre-built image 之后 + Start test DB stack 之前) ===

      # === W68 第 3 批 B-2 路径 1 核心新增: 预热 lazy 模型 step ===
      # 触发 24 个 router 全部 import + Whisper / ERes2Net / mimo SDK 预加载
      # 耗时: 冷启动 3-5 min (首次), warm 5-15 s (cache hit)
      # 写入 /root/.cache (含 __pycache__ + torch 模型), 跨 run 复用
      - name: "Pre-warm lazy models (W68 B-2, __pycache__ + Whisper + ERes2Net 预热)"
        run: |
          # 创建跨 run pycache 共享 volume (注意: docker volume 在 CI runner 上不可跨 job 复用,
          #   必须靠上面的 actions/cache@v4 持久化 /root/.cache 路径实现跨 run 复用)
          docker volume create pycache-vol 2>/dev/null || true
          docker network create qa-bench-net 2>/dev/null || true

          # W68 B-2 预热 step: 触发 24 router import + 3 lazy 模型
          docker run --rm \
            --name prewarm \
            --network qa-bench-net \
            -v pycache-vol:/root/.cache \
            -v $(pwd)/app:/app/app \
            -v $(pwd)/alembic/versions:/app/alembic/versions \
            -e SKIP_DB_SETUP=1 \
            -e LLM_OPENAI_COMPAT_BASE_URL=https://token-plan-cn.xiaomimimo.com/v1 \
            app-test:ci \
            python -c "
      import sys, time
      start = time.time()
      # 强制 import 所有 router (触发 lazy 加载)
      from app.api.v1 import (
          chat, meeting, meeting_recording, voice, voiceprint,
          tencent_meeting, task, knowledge, member, formula,
          hypothesis, project, memory, search, reminder,
          drive, drive_v2, drive_share, drive_activity,
          chat_history, auth, admin, agent_traces, health,
      )
      print(f'[prewarm] 24 routers imported in {time.time()-start:.2f}s', flush=True)

      # 触发 Whisper / ERes2Net 模型 lazy load
      start = time.time()
      try:
          from faster_whisper import WhisperModel
          print('[prewarm] faster_whisper imported', flush=True)
      except Exception as e:
          print(f'[prewarm] faster_whisper skip: {e}', flush=True)

      try:
          from app.voice.eres2net import ERes2Net
          print('[prewarm] ERes2Net imported', flush=True)
      except Exception as e:
          print(f'[prewarm] ERes2Net skip: {e}', flush=True)

      # 触发 mimo SDK lazy init (HTTPS pool 预热)
      try:
          from openai import AsyncOpenAI
          client = AsyncOpenAI(
              base_url='https://token-plan-cn.xiaomimimo.com/v1',
              api_key='prewarm-no-real-call',
          )
          print('[prewarm] AsyncOpenAI client created (HTTPS pool ready)', flush=True)
      except Exception as e:
          print(f'[prewarm] AsyncOpenAI skip: {e}', flush=True)

      print(f'[prewarm] total {time.time()-start:.2f}s, all models warmed', flush=True)
      " 2>&1 | tail -30

