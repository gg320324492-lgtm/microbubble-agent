# HTTPS 配置（SSL 证书申请后使用）
# 部署路径: /etc/nginx/conf.d/default.conf
# 2026-06-08: 修复 webhint 安全头/缓存/性能警告

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name agent.mnb-lab.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # 隐藏 nginx 版本号（webhint: server header should only contain server name）
    server_tokens off;

    listen 443 ssl http2;
    server_name agent.mnb-lab.cn;

    ssl_certificate     /etc/letsencrypt/live/agent.mnb-lab.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.mnb-lab.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 默认字符集（webhint: content-type charset should be utf-8）
    charset utf-8;
    charset_types text/css text/javascript application/javascript application/json application/manifest+json;

    # HSTS — 覆盖所有响应 (HTML/静态/sw.js/410/favicon/proxy 都生效)
    # 后端 FastAPI 不发送 HSTS, 无重复 header 风险; 必须放 server 块
    # 修 webhint 2026-06-29 audit: strict-transport-security 12 errors/route
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # webmanifest MIME 类型由 deploy-auto.sh 注入到 /etc/nginx/mime.types（http 块 include），
    # 不要再在 server context 用 types { } block（**完全覆盖**默认 mime.types 导致整站
    # octet-stream 白屏事故 2026-06-13 commit 0a29290）。
    # 错误示例：
    #   types { application/manifest+json webmanifest; }   ← 会让 .html/.css/.js 全变 octet-stream

    # gzip 压缩（大幅减少静态资源传输体积）
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        application/wasm
        image/svg+xml
        image/x-icon
        image/vnd.microsoft.icon
        font/woff
        font/woff2;

    root /opt/microbubble-agent/web/dist;
    index index.html;

    # ============================================
    # 屏蔽恶意扫描器和机器人
    # ============================================

    # 屏蔽敏感文件探测
    location ~* /\.(env|git|svn|htaccess|htpasswd|DS_Store|ssh|aws|azure|gcp) {
        return 444;
    }

    # 屏蔽常见漏洞路径（web$ 避免误杀 /webhook，test$/db$ 同理避免误杀合法路径）
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-login|xmlrpc|wordpress|blog|web$|news|2018|2019|shop|wp1|wp2|test$|media|site|cms|sito|admin|phpmyadmin|pma|mysql|db$|database|backup|bak|old|temp|tmp|debug|console|shell|cmd|exec|system|eval|base64|decode|encode) {
        return 444;
    }

    # 屏蔽云凭证探测
    location ~* ^/(.azure|.aws|.gcp|credentials|service-account) {
        return 444;
    }

    # 屏蔽开发文件探测
    location ~* ^/(_next|__next|node_modules|vendor|bower_components) {
        return 444;
    }

    # 屏蔽常见攻击路径
    location ~* ^/(boaform|formLogin|servlet|nccloud|k3cloud|easweb|owa) {
        return 444;
    }

    # 前端 SPA 路由 — HTML 页面不缓存，安全头
    # 不把 add_header 放 server 块（会泄漏到所有 proxy location）
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "max-age=0" always;
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # 旧版 manifest.webmanifest (无 hash) — git 已删除 + 重命名为 manifest.{hash}.webmanifest，
    # 但 try_files 找不到会 fallback 到 index.html，返回 HTML 内容。直接 410 避免误导。
    location = /manifest.webmanifest {
        return 410;
    }

    # Service Worker 强制 no-store
    # 之前 sw.js 命中 location ~* \.(js|css|...)$ 静态缓存规则，max-age=31536000 immutable
    # 导致用户浏览器**一年内不会重新拉 sw.js**，所有 SW_VERSION bump 都收不到，
    # 老 SW 一直控制页面（事故：commit 747a735 部署后用户仍卡在老 octet-stream 缓存）
    # 修复：精确路径 location 覆盖通用静态缓存规则，必须每次都重新拉
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # favicon.ico 精确匹配 — 1 年缓存 + immutable + nosniff
    # 浏览器自动请求 /favicon.ico（无 hash），必须用精确 location 保证命中
    # 不依赖下面的正则 location（顺序优先级，精确 = 优先匹配）
    # 双保险：避免 `add_header` 在 location / 中的 max-age=0 污染 .ico 响应
    location = /favicon.ico {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Webhook 代理 → 本地 webhook 服务
    location /webhook {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket 代理（必须在 /api 之前，路径前缀最长匹配优先）
    location /api/v1/ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 86400s;
    }

    # API 代理 → FRP 隧道 → 本地 Docker app
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_body_timeout 180s;
        client_max_body_size 50m;

        # 代理缓冲：避免大响应撑爆内存导致 HTTP/2 帧错误
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;
        proxy_max_temp_file_size 128m;

        proxy_hide_header X-XSS-Protection;

        # 安全响应头 2026-06-11:
        # 后端中间件 (app/main.py security_headers) 已统一设置 X-Content-Type-Options /
        # Cache-Control / Referrer-Policy / X-Request-ID。
        # 这里不在 Nginx 层 add_header — 会与后端重复，导致 webhint 看到两份 header
        # 时识别为 "missing or empty"。
        # 如果后端宕机/被绕过导致缺头，再考虑在 Nginx 兜底。
    }

    # WebSocket 代理 → FRP 隧道 → 本地 Docker app
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # MinIO 文件代理（通过 FRP 隧道）
    # 不添加 X-Content-Type-Options — MinIO 自己已发送 nosniff，再加会重复
    # proxy_hide_header 剥离 MinIO 自带的过时/无用头
    location ^~ /minio/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header X-Frame-Options;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 静态资源缓存（配合 Vite content-hash 文件名）
    # 2026-06-13 修复：加上 webmanifest 扩展名（vite-plugin-pwa manifestHashPlugin
    # 输出 manifest.{hash}.webmanifest 之前没在这个列表里，fallback 到 location / 的
    # max-age=0 → webhint 报 cache-control 警告）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

# ============================================
# mnb-lab.cn — 课题组官网 (Next.js 静态导出)
# ============================================

server {
    listen 80;
    server_name mnb-lab.cn www.mnb-lab.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mnb-lab.cn www.mnb-lab.cn;

    ssl_certificate     /etc/letsencrypt/live/mnb-lab.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mnb-lab.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # HSTS — 同 agent.mnb-lab.cn 块, 覆盖所有响应
    # 修 webhint 2026-06-29 audit: strict-transport-security 12 errors/route
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # 默认字符集
    charset utf-8;
    charset_types text/css text/javascript application/javascript application/json application/manifest+json;

    # webmanifest MIME 类型由 deploy-auto.sh 注入到 /etc/nginx/mime.types（http 块 include），
    # 不要再在 server context 用 types { } block（**完全覆盖**默认 mime.types 导致整站
    # octet-stream 白屏事故 2026-06-13 commit 0a29290）。
    # 错误示例：
    #   types { application/manifest+json webmanifest; }   ← 会让 .html/.css/.js 全变 octet-stream

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/manifest+json
        application/wasm
        image/svg+xml
        image/x-icon
        image/vnd.microsoft.icon
        font/woff
        font/woff2;

    root /var/www/mnb-lab;
    index index.html;

    # ============================================
    # 屏蔽恶意扫描器和机器人
    # ============================================

    # 屏蔽敏感文件探测
    location ~* /\.(env|git|svn|htaccess|htpasswd|DS_Store|ssh|aws|azure|gcp) {
        return 444;
    }

    # 屏蔽常见漏洞路径
    # mnb-lab.cn 合法路径：/news/, /media/ (images/media/ 下), /showcase/
    # news$、media$、site$ 加锚定避免误杀
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-login|xmlrpc|wordpress|blog|web$|news$|2018|2019|shop|wp1|wp2|test$|media$|site$|cms|sito|admin|phpmyadmin|pma|mysql|db$|database|backup|bak|old|temp|tmp|debug|console|shell|cmd|exec|system|eval|base64|decode|encode) {
        return 444;
    }

    # 屏蔽云凭证探测
    location ~* ^/(.azure|.aws|.gcp|credentials|service-account) {
        return 444;
    }

    # mnb-lab.cn 是 Next.js 站点，不屏蔽 _next/__next
    location ~* ^/(node_modules|vendor|bower_components) {
        return 444;
    }

    # 屏蔽常见攻击路径
    location ~* ^/(boaform|formLogin|servlet|nccloud|k3cloud|easweb|owa) {
        return 444;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=180" always;
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # 静态资源缓存
    # 2026-06-13 修复：加上 webmanifest 扩展名（vite-plugin-pwa manifestHashPlugin
    # 输出 manifest.{hash}.webmanifest 之前没在这个列表里，fallback 到 location / 的
    # max-age=0 → webhint 报 cache-control 警告）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webmanifest)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
