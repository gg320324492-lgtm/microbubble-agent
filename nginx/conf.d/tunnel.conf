# HTTPS 配置（SSL 证书申请后使用）
# 部署路径: /etc/nginx/conf.d/default.conf
# 2026-06-08: 修复 webhint 安全头/缓存/性能警告

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name agent.mnb-lab.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # 隐藏 nginx 版本号（webhint: server header should only contain server name）
    server_tokens off;

    listen 443 ssl http2;
    server_name agent.mnb-lab.cn;

    ssl_certificate     /etc/letsencrypt/live/agent.mnb-lab.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/agent.mnb-lab.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头（2026-06-08 更新）
    # - 移除 X-Frame-Options，改用 CSP frame-ancestors（更现代，支持更一致）
    # - 移除 X-XSS-Protection（已过时，现代浏览器不需要）
    # - 保留 Strict-Transport-Security + X-Content-Type-Options
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 默认字符集（webhint: content-type charset should be utf-8）
    charset utf-8;

    root /opt/microbubble-agent/web/dist;
    index index.html;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Webhook 代理 → 本地 webhook 服务
    location /webhook {
        proxy_pass http://127.0.0.1:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # API 代理 → FRP 隧道 → 本地 Docker app（含 WebSocket 支持）
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_body_timeout 180s;
        client_max_body_size 50m;
    }

    # WebSocket 代理 → FRP 隧道 → 本地 Docker app
    location /ws {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # MinIO 文件代理（通过 FRP 隧道）
    location ^~ /minio/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 静态资源缓存（配合 Vite content-hash 文件名）
    # 2026-06-08: 移除 expires，改用纯 Cache-Control（webhint: Expires 不应使用）
    # 注意：location 内的 add_header 会覆盖 server 块的 add_header，
    #       所以必须重复声明安全头（nginx 已知行为）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}

# ============================================
# mnb-lab.cn — 课题组官网 (Next.js 静态导出)
# ============================================

server {
    listen 80;
    server_name mnb-lab.cn www.mnb-lab.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mnb-lab.cn www.mnb-lab.cn;

    ssl_certificate     /etc/letsencrypt/live/mnb-lab.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mnb-lab.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 安全头（2026-06-08 更新，与 agent 站点一致）
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 默认字符集
    charset utf-8;

    root /var/www/mnb-lab;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存（2026-06-08: 移除 expires，改用纯 Cache-Control）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "frame-ancestors 'self'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}
