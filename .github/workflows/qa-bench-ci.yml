name: qa-bench D5 gate (1000 题 baseline)

# W67 第 30 步 (2026-07-23): 让 D5 gate 真实跑题
# - 复制 qa-bench-smoke.yml 的 test DB stack 启动逻辑 (pg-test + app-test on 8001)
# - 切 mimo cloud (而非 mock) 通过 MIMO_API_KEY
# - --include-extra 合并 700+300 = 1000 题, --rounds 3 majority consensus
# - 默认 timeout 90 分钟 (1000 题比 200 题慢)
# - 真实门禁: pass_rate < 80% → exit 1

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qa-bench-d5:
    name: qa-bench D5 1000 题 baseline (test DB)
    runs-on: ubuntu-latest
    # W67 第 47 步 (Agent 27): 120 min 保留. Step 8 /health 后固定等 60s
    #   给 router 注册完成, 后续 1000 题 runner ~60 min, 留足缓冲防 budget-edge 失败.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tests/qa-bench/requirements.txt

      - name: Cache pip + Docker layers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            /tmp/.buildx-cache
          key: ${{ runner.os }}-pip-docker-${{ hashFiles('requirements.txt', 'Dockerfile', 'web/package.json', 'web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-pip-docker-

      - name: Install Python dependencies
        working-directory: tests/qa-bench
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary --retries 10 --timeout 60 -r requirements.txt

      # === W67 第 38 步: 必须 setup buildx, 否则 cache-from: type=gha 不工作 ===
      # docker/build-push-action@v5 默认用 docker driver, 不支持 cache-from: type=gha (这是 buildx-only 功能).
      # 必须先 setup-buildx-action@v3 配 buildx. 0 config 即用 (默认 builder), 不需要 driver-opts.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # W67 第 38 步: 必须 setup buildx, 否则 cache-from: type=gha 不工作 (默认 docker driver 不支持)

      # === W67 第 36 步: Buildx + GHA 跨 run layer cache ===
      # W67 第 37 步: 必须显式 context = 仓库根 (前 step Install Python dependencies
      #   设了 working-directory: tests/qa-bench, docker/build-push-action@v5 默认
      #   context = 当前 step working-directory, 不显式就找不到仓库根 Dockerfile)
      - name: Build app-test image (W67 step 36 真 cache, 利用 GHA cache-from)
        uses: docker/build-push-action@v5
        with:
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/Dockerfile
          push: false
          load: true
          tags: app-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test DB stack (W67 step 33 用 image, 不再 build)
        run: |
          # 创建独立网络, 让容器间通过服务名直连 (Linux runner 无 host.docker.internal)
          docker network create qa-bench-net

          # 起 test DB
          docker run -d --name pg-test \
            --network qa-bench-net \
            -e POSTGRES_DB=microbubble_test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=microbubble2026 \
            postgres:16-alpine
          # 等 pg-test ready (最长 60s)
          for i in {1..30}; do
            if docker exec pg-test pg_isready -U postgres > /dev/null 2>&1; then
              echo "✓ pg-test ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "✗ pg-test startup timeout"
              docker logs pg-test | tail -30
              exit 1
            fi
            sleep 2
          done

          # 起 test app (8001 端口), 切 mimo cloud
          # W67 第 33 步: 用已 build image `app-test:ci`, 启动 ~30-60s (不再 6-10 min)
          docker run -d --name app-test \
            --network qa-bench-net \
            -p 8001:8000 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            -e REDIS_URL="redis://localhost:6379/1" \
            -e MINIO_ENDPOINT="localhost:9000" \
            -e MINIO_BUCKET="microbubble-test" \
            -e MINIO_PUBLIC_URL="http://localhost:9001" \
            -e LLM_BACKEND=openai_compat \
            -e LLM_OPENAI_COMPAT_BASE_URL=https://token-plan-cn.xiaomimimo.com/v1 \
            -e LLM_OPENAI_COMPAT_MODEL=mimo-v2.5 \
            -e MIMO_API_KEY="${{ secrets.MIMO_API_KEY }}" \
            -e SKIP_DB_SETUP=1 \
            -v $(pwd)/app:/app/app \
            -v $(pwd)/alembic/versions:/app/alembic/versions \
            app-test:ci \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log

          # 等 app-test 全 router ready (最长 1800s = 30min)
          # W67 第 39 步: 实测 1510s, 1500s 还差 10 秒. 提到 1800s 留缓冲 (最后 1 次).
          # W67 第 41 步 (Agent 21): SKIP_DB_SETUP 短路 lifespan 内 create_all + seed + reminder sync.
          #   实际启动 < 10 分钟 (含 30+ 模块 import ~3.75s). 保留 1800s 缓冲防回归.
          # W67 第 44 步 (Agent 24): /health 200 ≠ /auth/login router 就绪.
          #   lifespan yield 早 → /health ok, 但 @router.post 注册可能在最后阶段.
          #   改用 /health + /auth/login 双探针: invalid creds 返 401/422 = 路由存活
          #   (区别于 404 endpoint missing). 200 不期望 — 那是真凭据, 拒绝它.
          # W67 第 45 步 (Agent 25): 双探针过早接受 ready 反而添乱 — /health 200 后必须等
          #   5s 让 router 真注册完成, 再 probe /auth/login. 避免在 lifespan yield 和
          #   router 注册完成之间的窗口期误判 ready (返 404 → 后续 init step 一切失败).
          # W67 第 47 步 (Agent 27): Agent 26 的 30s 仍不够, 固定等 60s.
          # /health OK 只代表 lifespan 已 yield; 24 个 v1 router 的同步注册可能仍在继续.
          # 失败后循环会再次等待 60s 并探测, 直到 login 返回 401/422 或总超时.
          for i in {1..450}; do
            if ! curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              if [ "$i" -eq 450 ]; then
                echo "✗ app-test /health never returned 200 (final attempt $i/450)"
                docker logs app-test | tail -80
                docker logs pg-test | tail -30
                exit 1
              fi
              sleep 2
              continue
            fi
            # /health OK → wait 60s 让 router 真注册完成 (lifespan yield 早于 router 注册, 30s 不够)
            echo "  [probe $i/450] /health OK, 等 60s 给 router 真注册..."
            sleep 60
            # 探针 2: /auth/login 必须 401/422 (路由注册完成, 区别 404 endpoint-missing)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              http://localhost:8001/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"xiaoqi_testbot","password":"INVALID_PROBE_ROUTER_READY"}' 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "422" ]; then
              echo "✓ app-test 全 router ready (health=200 + login=$HTTP_CODE, attempt $i/450)"
              break
            fi
            echo "  [probe $i/450] /health=200 但 login=$HTTP_CODE (非 401/422 = router 还未注册完成), 继续等..."
            if [ "$i" -eq 450 ]; then
              echo "✗ app-test router startup timeout (final /health=200 但 login=$HTTP_CODE)"
              docker logs app-test | tail -80
              docker logs pg-test | tail -30
              exit 1
            fi
            sleep 2
          done

      - name: Init test DB schema + seed + test user (W67 第 41 步 合并脚本)
        run: |
          # W67 第 41 步 (Agent 21): 合并 init_db + ensure_test_user 到 1 个 Python 进程,
          # 节省 2× import overhead (~7-8s). alembic stamp head 跳过 (test DB 走 init_db.create_all,
          # 不需要 alembic 版本跟踪 — 生产 DB 走 alembic upgrade head 是另一回事).
          docker exec -e SKIP_DB_SETUP=1 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            app-test python scripts/init_test_db_all.py 2>&1 | tail -20
          # 期望输出: init_db "数据库初始化完成" + ensure_test_user "[OK] 测试账号已存在" 或 "[CREATED]"

      # === W67 第 43 步 (Agent 23): 在 Login 前诊断 xiaoqi_testbot 实际状态 ===
      # 历史: #35 (run 30011821182) Step 11 Login 30×2s=60s 失败, 无任何 app 端日志可查.
      # 根因可能是: (a) init_test_db_all 在 app-test *另进程* 跑, 提交后 app-test 主进程连接未刷池;
      #            (b) 测试 user 实际未创建 (init 步骤偶发 1s 完成, 怀疑 sleep-overwrite);
      #            (c) Redis 缺失导致限流 check 静默降级后再失败;
      #            (d) asyncpg first connect 慢.
      # 解决: 在 Step 11 Login 之前, 用 *同一连接参数* 直接查 xiaoqi_testbot + 验证密码哈希,
      #       并把 app-test 容器最近 80 行日志 / Login HTTP 4xx 响应也 print 出来.
      # 关键: 这个诊断 step 跑 fail-loud (exit 1) 当 DB 内容异常 → 后续 Login 会一定成功.
      - name: "Diagnostic - verify xiaoqi_testbot + capture app-test logs (W67 step 43)"
        run: |
          echo "=== [1] Direct DB probe (via app-test container's python + same DATABASE_URL) ==="
          docker exec -e SKIP_DB_SETUP=1 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            app-test python - <<'PYEOF'
          import asyncio, sys, os
          sys.path.insert(0, '/app')
          from sqlalchemy import select, text
          from app.core.database import async_session
          from app.models.member import Member
          from app.core.security import verify_password

          async def main():
              async with async_session() as db:
                  r = await db.execute(select(Member).where(Member.username == 'xiaoqi_testbot'))
                  m = r.scalar_one_or_none()
                  if m is None:
                      print('MEMBER_NOT_FOUND')
                      # 但要看 members 表真存在 + 数量
                      cnt = (await db.execute(text('SELECT count(*) FROM members'))).scalar()
                      print(f'members_count={cnt}')
                      return 1
                  print(f'member id={m.id} role={m.role} is_active={m.is_active} hashlen={len(m.password_hash) if m.password_hash else 0}')
                  if not m.password_hash:
                      print('NO_PASSWORD_HASH')
                      return 2
                  ok = verify_password('testbot_pass_2026', m.password_hash)
                  print(f'verify_password=testbot_pass_2026 -> {ok}')
                  return 0 if ok else 3
          sys.exit(asyncio.run(main()))
          PYEOF
          echo ""
          echo "=== [2] Single raw login attempt (不静默, 显示 HTTP code + body) ==="
          HTTP_CODE=$(curl -s -o /tmp/login_body.txt -w "%{http_code}" \
            -X POST http://localhost:8001/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"xiaoqi_testbot","password":"testbot_pass_2026"}')
          echo "HTTP_CODE=$HTTP_CODE"
          echo "BODY=$(head -c 500 /tmp/login_body.txt)"
          echo ""
          echo "=== [3] app-test 容器最近 80 行日志 (诊断 startup / init 是否真正成功) ==="
          docker logs --tail 80 app-test 2>&1 | tail -80

      - name: Generate 1000 题题库 (D4 base 700 + D5 extra 300)
        working-directory: tests/qa-bench
        run: |
          # 生成 base 700 题 (含 schema)
          python gen780.py --output questions_780.jsonl --schema-only
          wc -l questions_780.jsonl
          # D4 extra 300 题已在 questions_d4_extra_300.jsonl (Agent 2 已合并, 不需要再生成)
          if [ ! -f questions_d4_extra_300.jsonl ]; then
            echo "✗ questions_d4_extra_300.jsonl 不存在, D5 无法跑"
            exit 1
          fi
          wc -l questions_d4_extra_300.jsonl

      - name: Login as admin to get JWT (W67 第 42 步)
        run: |
          # W67 第 42 步 (Agent 22): 实测 Step 11 1s fail 因 --token "${QA_TOKEN:-mock}" fallback "mock" 字符串,
          #   JWT 验证失败 (无用户). 改 CI 启动 app 后立即用 ensure_test_user 创建的 xiaoqi_testbot 登录拿真 JWT.
          #
          # 为什么用 xiaoqi_testbot (非 admin) — scripts/ensure_test_user.py 默认账号是 xiaoqi_testbot /
          #   testbot_pass_2026 (生产 admin 物理隔离). init_test_db_all.py 第 3 步自动确保存在.
          #
          # W67 第 43 步 (Agent 23): 上方 Diagnostic step 已先验证 user + 密码, 此处单一目的是取 JWT.
          # 重试机制: app-test 可能刚 ready 但 lifespan 还在最后阶段, /health 200 不代表路由就绪.
          #   最多重试 30 次 × 2s = 60s. W67 步减少为 15 次 × 2s = 30s (fail-fast).
          for i in {1..15}; do
            HTTP_CODE=$(curl -s -o /tmp/login_resp.txt -w "%{http_code}" \
              -X POST http://localhost:8001/api/v1/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"xiaoqi_testbot","password":"testbot_pass_2026"}' 2>&1)
            if [ "$HTTP_CODE" = "200" ]; then
              LOGIN_RESP=$(cat /tmp/login_resp.txt)
              echo "✓ HTTP 200 OK (attempt $i)"
              break
            fi
            echo "✗ attempt $i HTTP $HTTP_CODE: $(head -c 200 /tmp/login_resp.txt)"
            if [ "$i" -eq 15 ]; then
              echo "=== app-test logs (final 80 lines) ==="
              docker logs --tail 80 app-test 2>&1 | tail -80
              echo "=== pg-test logs (final 30 lines) ==="
              docker logs --tail 30 pg-test 2>&1 | tail -30
              exit 1
            fi
            sleep 2
          done
          TOKEN=$(echo "$LOGIN_RESP" | python -c "import json,sys; print(json.load(sys.stdin).get('access_token',''))")
          if [ -z "$TOKEN" ]; then
            echo "✗ Login response missing access_token: $LOGIN_RESP"
            exit 1
          fi
          echo "✓ Login OK, token length ${#TOKEN}"
          echo "REAL_QA_TOKEN=$TOKEN" >> $GITHUB_ENV

      # === 关键改动: --api-base http://localhost:8001 指向 test app + --include-extra 合并 1000 题 ===
      - name: Run qa-bench D5 (1000 题 baseline, against test DB 8001)
        working-directory: tests/qa-bench
        env:
          # W67 第 29 步: 切 mimo cloud
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          # W67 第 42 步: 用 login 拿的真 JWT (上方 Login step 设的 $GITHUB_ENV), 不再 ${QA_TOKEN:-mock} fallback.
          #   ${{ env.REAL_QA_TOKEN }} 引用 step 间共享的 env (GITHUB_ENV).
          QA_TOKEN: ${{ env.REAL_QA_TOKEN }}
          LLM_BACKEND: openai_compat
          LLM_OPENAI_COMPAT_BASE_URL: https://token-plan-cn.xiaomimimo.com/v1
          LLM_OPENAI_COMPAT_MODEL: mimo-v2.5
        run: |
          # --include-extra: 合并 700 base + 300 extra = 1000 题
          # --rounds 3 + --verdict-consensus majority: 三轮多数决, 减少单轮随机噪声
          # --concurrency 3: mimo tier 限流保护 (1000 题 30-60 min)
          # W67 第 42 步: --token 直接传 $QA_TOKEN (无 fallback), CI 必须先 login 成功, fail loud.
          python runner.py \
            --token "${QA_TOKEN}" \
            --api-base "http://localhost:8001" \
            --include-extra \
            --rounds 3 \
            --verdict-consensus majority \
            --output results/baseline_d5_1000 \
            --concurrency 3
          # 期望 ~60 分钟跑完 (1000 题 × 3 rounds × 1 majority consensus, mimo tier)
          if [ -f results/baseline_d5_1000/results.json ]; then
            echo "✓ D5 1000 题完成 (test DB, 无生产污染)"
            cat results/baseline_d5_1000/report.md | head -50
          else
            echo "✗ D5 失败"
            exit 1
          fi

      - name: Upload D5 baseline report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-bench-d5-baseline
          path: tests/qa-bench/results/baseline_d5_1000/
          retention-days: 30

      # === 硬门禁: pass_rate < 80% → exit 1 (即使 runner.py 跑了也得验证) ===
      - name: Fail if pass_rate < 80%
        if: always()
        working-directory: tests/qa-bench
        run: |
          if [ -f results/baseline_d5_1000/results.json ]; then
            PASS_RATE=$(python3 << 'PYEOF'
          import json
          with open('results/baseline_d5_1000/results.json') as f:
              d = json.load(f)
          total = d['summary']['total']
          pass_ = d['summary']['pass']
          print(round(pass_ / max(total, 1) * 100, 1))
          PYEOF
          )
            echo "D5 通过率: ${PASS_RATE}%"
            python3 << 'PYEOF'
          import sys
          pass_rate = float('${PASS_RATE}')
          threshold = 80.0
          if pass_rate < threshold:
              print(f'❌ 通过率 {pass_rate}% < 阈值 {threshold}%, D5 gate 阻断 merge')
              sys.exit(1)
          else:
              print(f'✓ 通过率 {pass_rate}% >= 阈值 {threshold}%, D5 gate 通过')
          PYEOF
          fi

      # === Teardown: 清 test stack ===
      - name: Teardown test stack
        if: always()
        run: |
          docker rm -f app-test pg-test 2>/dev/null || true
          docker network rm qa-bench-net 2>/dev/null || true
          echo "✓ test DB stack cleaned up"