name: QA Bench Smoke (200 questions, < 5 min, test DB)

# v3.0 计划 — 每次 PR 跑 200 题 smoke 子集
# 700 题全量太慢（5+ 小时），所以跑 hot_path 标签的 200 题
# 5 分钟内必须通过，否则 PR 红 ✗ 阻断 merge

# 2026-07-02 修复 (qa-bench-smoke-test-db):
# - 改用 test DB stack (microbubble_test + 8001 端口 app) 避免污染生产 DB
# - 加 init_db + ensure_test_user 步骤 (test DB 完全冷启动)
# - runner.py --api-base http://localhost:8001 指向 test app

on:
  pull_request:
    branches: [main]
    paths:
      - "app/agent/**"
      - "app/services/chat_history*.py"
      - "app/services/self_rag.py"
      - "app/services/reminder_*.py"
      - "app/config.py"
      - "tests/qa-bench/**"
      - ".github/workflows/qa-bench-smoke.yml"
  push:
    branches: [main]
    paths:
      - "app/agent/**"
      - "app/services/chat_history*.py"
      - "app/services/self_rag.py"
      - "tests/qa-bench/**"
      - ".github/workflows/qa-bench-smoke.yml"
  workflow_dispatch:
    inputs:
      question_count:
        description: "跑题数 (默认 200 smoke, 0 = 全量 700)"
        required: false
        default: "200"

permissions:
  contents: read

jobs:
  qa-bench-smoke:
    name: QA Bench 200 题 Smoke (test DB)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary --retries 10 --timeout 60 httpx

      # === W67 第 33 步: 拆 build + run (修复 6-10 min 重 build 问题) ===
      # 之前: `docker build -q .` 内嵌在 `docker run`, 每次都重 build 完整 image 没 cache
      # 现在: 先 build 一次 (GHA cache 复用 layer), 再 run 起来
      - name: Build app-test image (W67 step 33 拆 build, 利用 GHA cache)
        run: |
          # 关键: `docker build -t app-test:ci .` 单独 step, 失败时 stop, 不污染后续
          docker build -t app-test:ci . 2>&1 | tail -30
          echo "✓ app-test:ci image built"

      # === 新增 test DB stack 启动 (替代生产 app/db) ===
      # v2026-07-23 修复: 改用 Docker network 让 app-test 通过服务名 `pg-test` 直连,
      #   解决 Linux runner 上 `host.docker.internal` 不解析的连接问题.
      # W67 第 33 步: 用已 build image `app-test:ci`, 启动 ~30-60s (不再 6-10 min)
      - name: Start test DB stack (microbubble_test + app on 8001, 用 image)
        run: |
          # 创建独立网络, 让容器间通过服务名直连 (Linux runner 无 host.docker.internal)
          docker network create qa-bench-net

          # 起 test DB (独立容器, 端口 5433 避免与生产 db:5432 冲突)
          docker run -d --name pg-test \
            --network qa-bench-net \
            -e POSTGRES_DB=microbubble_test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=microbubble2026 \
            postgres:16-alpine
          # 等 pg-test ready (最长 60s)
          for i in {1..30}; do
            if docker exec pg-test pg_isready -U postgres > /dev/null 2>&1; then
              echo "✓ pg-test ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "✗ pg-test startup timeout"
              docker logs pg-test | tail -30
              exit 1
            fi
            sleep 2
          done

          # 起 test app (8001 端口, 接 test DB 通过同网络服务名 pg-test)
          # W67 第 33 步: 用已 build image, 不再 `$(docker build -q .)`
          docker run -d --name app-test \
            --network qa-bench-net \
            -p 8001:8000 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            -e REDIS_URL="redis://localhost:6379/1" \
            -e MINIO_ENDPOINT="localhost:9000" \
            -e MINIO_BUCKET="microbubble-test" \
            -e MINIO_PUBLIC_URL="http://localhost:9001" \
            -e LLM_BACKEND=mock \
            -e SKIP_DB_SETUP=1 \
            -v $(pwd)/app:/app/app \
            -v $(pwd)/alembic/versions:/app/alembic/versions \
            app-test:ci \
            uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log

          # 等 app-test healthy (最长 1500s = 25min)
          # W67 第 35 步: 实测 909s, 900s 还差 9 秒. 提到 1500s 留充分缓冲.
          # 拆 build 修复 (W67 第 33 步) 后实际启动 15+ min (mimo SDK + Whisper 18s + 全套 import)
          for i in {1..750}; do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "✓ app-test healthy on 8001"
              break
            fi
            if [ "$i" -eq 750 ]; then
              echo "✗ app-test startup timeout"
              docker logs app-test | tail -50
              exit 1
            fi
            sleep 2
          done

      - name: Init test DB schema + seed data
        run: |
          # 用 Base.metadata.create_all 建表 + seed (init_db.py 同时插入 24 members 等)
          docker exec -e SKIP_DB_SETUP=1 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            app-test python scripts/init_db.py 2>&1 | tail -5

          # alembic stamp head (init_db 用 create_all, 不走 alembic, 需要手动 stamp)
          # 关键: alembic_version.version_num VARCHAR(32) 上限 (CLAUDE.md 2026-06-02 教训),
          # 055 migration 已重命名为 055_personal_wechat_ci (22 字符) 适配
          docker exec -e SKIP_DB_SETUP=1 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            app-test alembic stamp head 2>&1 | tail -3

      - name: Ensure test user (xiaoqi_testbot) exists
        run: |
          docker exec -e SKIP_DB_SETUP=1 \
            -e DATABASE_URL="postgresql+asyncpg://postgres:microbubble2026@pg-test:5432/microbubble_test" \
            app-test python scripts/ensure_test_user.py 2>&1 | tail -3
          # 期望: [OK] 或 [CREATED] 都行 (幂等)

      - name: Generate 700 题题库
        working-directory: tests/qa-bench
        run: |
          python gen780.py --output questions_780.jsonl --schema-only
          wc -l questions_780.jsonl

      # === 关键改动: --api-base http://localhost:8001 指向 test app + --smoke 简写 (v3.1 D6) ===
      - name: Run 200 题 smoke (against test DB 8001)
        working-directory: tests/qa-bench
        env:
          API_BASE: http://localhost:8001     # ← 改 8001 (test app)
          QA_TOKEN: ${{ secrets.QA_TOKEN }}
        run: |
          # v3.1 D6: --smoke 等价于 --limit 200 + 优先 questions_780.jsonl
          # 取代旧的 `head -200 questions_780.jsonl > smoke_200.jsonl` + `--questions smoke_200.jsonl` 两步
          python runner.py \
            --token "${QA_TOKEN:-mock}" \
            --api-base "http://localhost:8001" \
            --smoke \
            --output results/smoke \
            --concurrency 4
          # 期望 5 分钟内完成
          if [ -f results/smoke/results.json ]; then
            echo "✓ Smoke 200 题完成 (test DB, 无生产污染)"
            cat results/smoke/report.md | head -50
          else
            echo "✗ Smoke 失败"
            exit 1
          fi

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-bench-smoke-report
          path: tests/qa-bench/results/smoke/
          retention-days: 14

      - name: Fail if pass_rate < 80%
        if: always()
        working-directory: tests/qa-bench
        run: |
          if [ -f results/smoke/results.json ]; then
            PASS_RATE=$(python3 << 'PYEOF'
          import json
          with open('results/smoke/results.json') as f:
              d = json.load(f)
          total = d['summary']['total']
          pass_ = d['summary']['pass']
          print(round(pass_ / max(total, 1) * 100, 1))
          PYEOF
          )
            echo "Smoke 通过率: ${PASS_RATE}%"
            python3 << 'PYEOF'
          import sys
          pass_rate = float('${PASS_RATE}')
          threshold = 80.0
          if pass_rate < threshold:
              print(f'❌ 通过率 {pass_rate}% < 阈值 {threshold}%, PR 阻断')
              sys.exit(1)
          else:
              print(f'✓ 通过率 {pass_rate}% >= 阈值 {threshold}%, PR 通过')
          PYEOF
          fi

      # === 2026-07-13 #P1: 三档推理模式 benchmark (30 题 × 3 mode = 90 次, 验证 fast/balanced/deep 真区分) ===
      - name: Run fast vs balanced vs deep benchmark (30 题 × 3 mode)
        working-directory: tests/qa-bench
        env:
          API_BASE: http://localhost:8001
          QA_TOKEN: ${{ secrets.QA_TOKEN }}
        run: |
          python scripts/benchmark_fast_vs_deep.py \
            --questions tests/qa-bench/questions_fast_vs_deep.jsonl \
            --api-base-fast http://localhost:8001 \
            --api-base-balanced http://localhost:8001 \
            --api-base-deep http://localhost:8001 \
            --token "${QA_TOKEN:-mock}" \
            --concurrency 2 \
            --output docs/benchmarks/fast-vs-deep-${GITHUB_SHA::8}.md
          # 注: 单 docker 配置下 3 mode 走同一后端, 实际三档区分由 THINKING_MODE env + 后端 thinking_config 调度
          # 验证: deep 模式应该 thinking_tokens_used > 0, fast 模式延迟 < balanced < deep

      - name: Upload thinking mode benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fast-vs-deep-benchmark
          path: docs/benchmarks/fast-vs-deep-*.md

# === 新增: 清理 test stack ===
      - name: Teardown test stack
        if: always()
        run: |
          docker rm -f app-test pg-test 2>/dev/null || true
          docker network rm qa-bench-net 2>/dev/null || true
          echo "✓ test DB stack cleaned up"