name: Lint CSS

on:
  pull_request:
    branches: [main]
    paths:
      - "web/src/**"
      - "web/.stylelintrc.json"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/playwright.config.js"
      - "web/tests/**"
  push:
    branches: [main]
    paths:
      - "web/src/**"
      - "web/.stylelintrc.json"
      - "web/package.json"
      - "web/package-lock.json"
      - "web/playwright.config.js"
      - "web/tests/**"
  # v76.4: 允许手动触发 baseline-guard, 输入 max-increase 临时放宽门禁
  # 用法: Actions → Lint CSS → Run workflow → 输入 max_increase + tracking_issue
  workflow_dispatch:
    inputs:
      max_increase:
        description: "允许临时增加的 stylelint 错误数 (默认 0 = hard fail on any error)"
        required: false
        default: "0"
      tracking_issue:
        description: "临时放宽门禁对应的 issue 编号 (如 #123), 用于审计追溯"
        required: false
        default: ""

# v76.3p: 给 workflow write 权限 (auto-commit baseline png 需要 push)
permissions:
  contents: write

jobs:
  stylelint:
    name: Stylelint (CSS / Vue)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run Stylelint
        working-directory: web
        run: npm run lint:css

      # 检查 var(--token, ...) 中 token 都在 variables.css 定义（v73 沉淀，v74 改 hard fail）
      - name: Check token orphans
        run: bash scripts/check-token-orphans.sh --ci-mode
        # v74: 移除 continue-on-error (白名单已覆盖 --i 等设计意图, 真 orphan 必须 fail)
        # v76.5: 加 --ci-mode 输出 ::error file=...,line=... annotation, PR 视图显示错误位置

      # 同时跑 vitest 兜底（stylelint 漏掉的逻辑错误）
      - name: Run unit tests (smoke)
        working-directory: web
        run: npm run test:unit -- --run --reporter=dot 2>&1 | tail -30
        continue-on-error: true  # 不阻断 stylelint 主检查 (test failure 是另一回事)

  # P3 守卫：v70/v71/v72 累计的 0 错误基线 + v74 趋势统计
  stylelint-baseline-guard:
    name: Stylelint 0 errors baseline + trend
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50  # v74: 取最近 50 commit 用于趋势对比
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Get current error count
        id: current
        working-directory: web
        run: |
          OUTPUT=$(npm run lint:css 2>&1)
          CURRENT=$(echo "$OUTPUT" | grep -oE '[0-9]+ problems? \([0-9]+ errors?' | grep -oE '\([0-9]+ errors?' | grep -oE '[0-9]+' || echo "0")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "current_error_count=$CURRENT" >> "$GITHUB_ENV"
          echo "📊 当前错误数: $CURRENT"
          # v75: 解析每条 error 详情 (file:line) 用于 PR annotation
          echo "error_details<<EOF" >> "$GITHUB_OUTPUT"
          # stylelint 输出格式: src/path/file.vue:LINE:COL  ✖  message  rule-name
          echo "$OUTPUT" | grep -E "✖" | head -50 >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Get baseline error count from last commit
        id: baseline
        run: |
          # v74: 从 main 上次 commit 跑一次 lint 取基线数
          # 用 git stash 临时回到 HEAD~1, 跑 lint, 然后 stash pop
          git stash --include-untracked > /dev/null 2>&1 || true
          BASELINE=$(cd web && (npm run lint:css 2>&1 || true) | grep -oE '[0-9]+ problems? \([0-9]+ errors?' | grep -oE '\([0-9]+ errors?' | grep -oE '[0-9]+' || echo "0")
          git stash pop > /dev/null 2>&1 || true
          echo "baseline=$BASELINE" >> "$GITHUB_OUTPUT"
          echo "📊 上次 commit 基线: $BASELINE"

      - name: Trend comparison
        if: steps.current.outputs.current != steps.baseline.outputs.baseline
        run: |
          CURRENT=${{ steps.current.outputs.current }}
          BASELINE=${{ steps.baseline.outputs.baseline }}
          DIFF=$((CURRENT - BASELINE))
          if [ "$DIFF" -gt 0 ]; then
            TREND="🔺 +${DIFF}"
            EMOJI="❌"
          else
            TREND="🔻 ${DIFF}"
            EMOJI="✅"
          fi
          echo "${EMOJI} 趋势: $BASELINE → $CURRENT ($TREND)"

      - name: Baseline gate (must be 0)
        # v76.4: 接受 workflow_dispatch inputs.max_increase 临时放宽门禁
        # PR 自动触发 max_increase=0 (hard fail); workflow_dispatch 输入 N 允许临时增加 N 错误
        if: steps.current.outputs.current != '0'
        env:
          # 默认 0 (hard fail), workflow_dispatch 触发时用输入值
          MAX_INCREASE: ${{ github.event.inputs.max_increase || '0' }}
          TRACKING_ISSUE: ${{ github.event.inputs.tracking_issue || '' }}
        run: |
          CURRENT=${{ steps.current.outputs.current }}
          BASELINE=${{ steps.baseline.outputs.baseline }}
          DIFF=$((CURRENT - BASELINE))

          if [ "$DIFF" -le "$MAX_INCREASE" ]; then
            # ✅ 允许临时增加 (在 max_increase 范围内)
            echo "::warning::Stylelint errors: $BASELINE → $CURRENT (+${DIFF}), within max_increase=${MAX_INCREASE}"
            if [ -n "$TRACKING_ISSUE" ]; then
              echo "::notice::Tracked by ${TRACKING_ISSUE} (manual override)"
            fi
            exit 0
          fi

          # ❌ 超出 max_increase, hard fail
          if [ "$MAX_INCREASE" -gt 0 ]; then
            echo "::error::Stylelint errors increased +${DIFF}, exceeds max_increase=${MAX_INCREASE} (current=$CURRENT, baseline=$BASELINE)"
          else
            echo "::error::Stylelint found $CURRENT errors (baseline violation, must be 0)"
          fi
          if [ -n "$TRACKING_ISSUE" ]; then
            echo "::notice::Requested override with ${TRACKING_ISSUE}, but max_increase exceeded"
          fi
          cd web && npm run lint:css 2>&1 | tail -30
          exit 1

      - name: PR annotation (v75)
        if: github.event_name == 'pull_request' && steps.current.outputs.current != '0'
        run: |
          # v75: 解析每条 stylelint error 输出 ::error file=...line=... annotation
          # GitHub Actions 自动在 PR 视图显示错误位置
          cd web
          ERROR_DETAILS='${{ steps.current.outputs.error_details }}'
          while IFS= read -r line; do
            # 解析 src/path:LINE:COL  ✖  message  rule-name
            FILE=$(echo "$line" | grep -oE '^[^ ]+\.(vue|css|scss)' | head -1)
            LINENUM=$(echo "$line" | grep -oE ':[0-9]+:[0-9]+' | head -1 | cut -d: -f2)
            MESSAGE=$(echo "$line" | sed -E 's/^.*✖[[:space:]]+//' | sed -E 's/[[:space:]]+[a-z][a-z-]*$//')
            if [ -n "$FILE" ] && [ -n "$LINENUM" ]; then
              echo "::error file=$FILE,line=$LINENUM::$MESSAGE"
            fi
          done <<< "$ERROR_DETAILS"

      - name: ✅ Stylelint 0 errors (baseline maintained)
        if: steps.current.outputs.current == '0'
        run: echo "✅ Stylelint 0 errors (baseline maintained)"

  # v76.2: 视觉回归 baseline 对比 job
  # 第一次跑会生成 baseline png, 后续跑对比 baseline, 视觉变化 > 0.2% fail
  visual-regression:
    name: Visual regression (mobile 3 页面 baseline)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      # Build + 启动 preview server (后台跑, 跑完测试后 kill)
      - name: Build + serve
        working-directory: web
        run: |
          npm run build
          npx vite preview --port 4173 --host 0.0.0.0 &
          PREVIEW_PID=$!
          for i in {1..30}; do
            curl -s http://localhost:4173 > /dev/null && break
            sleep 1
          done
          echo "PREVIEW_PID=$PREVIEW_PID" >> $GITHUB_ENV

      - name: Run visual regression
        working-directory: web
        env:
          BASE_URL: http://localhost:4173
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
        run: |
          # v76.3n: 三模式
          # - workflow_dispatch (手动) → 维护 baseline (update-snapshots)
          # - push to main → 维护 baseline (update-snapshots, auto-commit)
          # - pull_request → 对比 baseline (fail 阻止 merge)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "::notice::PR 跑 baseline 对比模式 (fail 阻止 merge)"
            npx playwright test
          else
            echo "::notice::${{ github.event_name }} 跑 baseline 生成模式 (auto-commit)"
            npx playwright test --update-snapshots
          fi
        # PR 失败时不停 (让 artifact upload 步骤能跑)

      # PR 跑视觉回归 fail 时, 上传 diff png 让 reviewer 看
      - name: Upload visual diff artifacts
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-diff
          path: web/test-results/
          retention-days: 7

      # main push / workflow_dispatch 自动 commit baseline png
# v76.3n: 不再限定 main branch, 所有非 PR 触发都更新 baseline
      - name: Auto-commit baseline update
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f web/tests/visual/mobile/visual-regression.spec.mjs-snapshots/
          if git diff --cached --quiet; then
            echo "无 baseline 变更"
          else
            git commit -m "test(visual): 自动更新 baseline (v76.3n visual regression job)"
            git push
          fi

      # cleanup: kill preview server
      - name: Cleanup
        if: always()
        run: |
          if [ -n "$PREVIEW_PID" ]; then kill $PREVIEW_PID 2>/dev/null || true; fi
