name: qa-bench D7 baseline audit

# D7 makes the historical regression contract executable on every pull request.
# The baseline is intentionally independent from the long D5 question run.
on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  baseline:
    name: D7 baseline (71 passed, 7 skipped)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # The nine-file suite uses Redis LIST semantics in two tests.
      REDIS_URL: redis://localhost:6379/0
      SKIP_DB_SETUP: "1"
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tests/qa-bench/requirements.txt

      - name: Install qa-bench dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary --retries 10 --timeout 60 \
            -r tests/qa-bench/requirements.txt

      # The qa-bench requirements are deliberately small and do not contain the
      # application test harness. Install only the modules imported by the
      # nine baseline files; avoid pulling GPU/ASR production dependencies into CI.
      - name: Install baseline test runtime
        run: |
          pip install --prefer-binary --retries 10 --timeout 60 \
            'pytest>=8.2,<9' \
            'pytest-asyncio>=0.25,<1' \
            'fastapi>=0.109.0' \
            'sqlalchemy==2.0.23' \
            'asyncpg==0.29.0' \
            'redis==5.0.1' \
            'celery==5.3.6' \
            'minio==7.2.0' \
            'pydantic-settings==2.1.0' \
            'pydantic[email]==2.5.2' \
            'python-jose[cryptography]==3.3.0' \
            'passlib[bcrypt]==1.7.4' \
            'bcrypt==4.2.1' \
            'python-multipart==0.0.6' \
            'email-validator==2.1.0' \
            'python-dotenv==1.0.0' \
            'alembic==1.13.0' \
            'pgvector==0.2.4' \
            'numpy==1.26.2' \
            'httpx==0.25.2'

      # Keep this direct invocation as a visible contract. The module is a
      # pytest test module, so the following pytest invocation executes it.
      - name: Run baseline audit definition
        run: |
          python tests/test_baseline_audit.py
          python -m pytest tests/test_baseline_audit.py -q --disable-warnings

      - name: Run nine-file baseline (71 PASS + 7 SKIP)
        run: bash scripts/ci_qa_bench_baseline.sh

      - name: Verify app import
        if: always()
        run: python -c "import app; print('app import OK')"

      - name: Upload baseline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-bench-d7-baseline-log
          path: logs/ci-baseline-*.log
          if-no-files-found: warn
          retention-days: 14

      # Notifications are best effort. The failing test step remains the
      # authoritative job result and cannot be hidden by a notification error.
      - name: Notify failed PR and Slack
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_TEXT: >-
            qa-bench D7 baseline failed in ${{ github.repository }}
            at ${{ github.sha }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set +e
          MESSAGE="qa-bench D7 baseline failed: expected 71 passed + 7 skipped."
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          # Some organizations install a gh notification extension. Use it when
          # available; stock GitHub-hosted runners fall back to a PR comment.
          if [ -n "$PR_NUMBER" ] && gh notification create --help >/dev/null 2>&1; then
            gh notification create --repo "$REPO" --pr "$PR_NUMBER" --message "$MESSAGE"
          elif [ -n "$PR_NUMBER" ] && command -v gh >/dev/null 2>&1; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$MESSAGE"
          else
            echo "No pull-request notification target (event is not a PR or gh is unavailable)."
          fi

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            PAYLOAD=$(SLACK_TEXT="$SLACK_TEXT" python -c \
              'import json, os; print(json.dumps({"text": os.environ["SLACK_TEXT"]}))')
            curl --fail --silent --show-error --max-time 15 \
              -X POST -H 'Content-Type: application/json' \
              --data "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          else
            echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
          fi
          exit 0
