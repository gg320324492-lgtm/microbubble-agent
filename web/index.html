<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 移动端 viewport 配置：
       - viewport-fit=cover: 允许内容延伸到刘海/底部 Home Indicator 区域，配合 env(safe-area-inset-*) 适配
       - 不写 maximum-scale / user-scalable：遵循 webhint a11y 建议，默认允许用户缩放
       - width=device-width: 不使用固定 viewport（iOS 横屏 980→390） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- 主题色（浏览器顶部栏 + Android 任务切换器）
       Firefox 不支持 media 属性，dark mode 由 useThemeStore 动态写入第 2 个 meta 标签 -->
  <meta name="theme-color" content="#FF7A5C">

  <!-- iOS 添加到主屏幕（Web App） -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="小气助手">

  <!-- Android Chrome -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="小气助手">

  <!-- 描述 -->
  <meta name="description" content="微纳米气泡课题组智能助手 - 任务/会议/知识一体化">

  <title>微纳米气泡课题组 - 智能Agent</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
