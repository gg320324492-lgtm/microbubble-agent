<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毛玻璃风格 (Glassmorphism)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            max-width: 1200px;
            width: 100%;
        }

        /* 毛玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 32px;
            color: white;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.35);
        }

        .glass-card h2 {
            font-size: 24px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .glass-card p {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .glass-card .icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .glass-card .tag {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
            backdrop-filter: blur(5px);
        }

        /* 装饰元素 */
        .decoration {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .decoration-1 {
            width: 200px;
            height: 200px;
            top: -50px;
            right: -50px;
            animation: float 6s ease-in-out infinite;
        }

        .decoration-2 {
            width: 150px;
            height: 150px;
            bottom: -30px;
            left: -30px;
            animation: float 8s ease-in-out infinite reverse;
        }

        .decoration-3 {
            width: 100px;
            height: 100px;
            top: 50%;
            left: 50%;
            animation: float 10s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 按钮样式 */
        .btn-glass {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* 输入框样式 */
        .input-glass {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .input-glass::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-glass:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* 进度条 */
        .progress-glass {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
        }

        .progress-glass .bar {
            height: 100%;
            background: linear-gradient(90deg, #FF7A5C, #FFB347);
            border-radius: 4px;
            transition: width 1s ease;
        }

        /* 统计数据 */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 16px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        /* 头像组 */
        .avatar-group {
            display: flex;
            margin-top: 20px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF7A5C, #FFB347);
            border: 3px solid rgba(255, 255, 255, 0.3);
            margin-left: -12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .avatar:first-child {
            margin-left: 0;
        }
    </style>
</head>
<body>
    <!-- 装饰元素 -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>

    <div class="container">
        <!-- 卡片 1: 项目概览 -->
        <div class="glass-card">
            <div class="icon">📊</div>
            <h2>项目概览</h2>
            <p>毛玻璃风格（Glassmorphism）是现代UI设计的流行趋势，通过半透明背景和模糊效果创造层次感。</p>
            <div class="progress-glass">
                <div class="bar" style="width: 75%"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; opacity: 0.8;">
                <span>进度: 75%</span>
                <span>剩余 3 天</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number">12</div>
                    <div class="stat-label">任务</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">8</div>
                    <div class="stat-label">完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number">4</div>
                    <div class="stat-label">进行中</div>
                </div>
            </div>
        </div>

        <!-- 卡片 2: 团队成员 -->
        <div class="glass-card">
            <div class="icon">👥</div>
            <h2>团队成员</h2>
            <p>通过背景模糊和半透明效果，毛玻璃设计让内容层次更加清晰，视觉效果更加优雅。</p>
            <div class="avatar-group">
                <div class="avatar">张</div>
                <div class="avatar">李</div>
                <div class="avatar">王</div>
                <div class="avatar">+5</div>
            </div>
            <div style="margin-top: 20px;">
                <span class="tag">前端</span>
                <span class="tag">后端</span>
                <span class="tag">设计</span>
                <span class="tag">测试</span>
            </div>
        </div>

        <!-- 卡片 3: 快速操作 -->
        <div class="glass-card">
            <div class="icon">⚡</div>
            <h2>快速操作</h2>
            <p>毛玻璃效果在深色和浅色背景上都能呈现出色的视觉效果，适应性强。</p>
            <input type="text" class="input-glass" placeholder="输入搜索内容...">
            <button class="btn-glass">
                🔍 搜索
            </button>
            <button class="btn-glass" style="margin-left: 12px;">
                ➕ 新建
            </button>
        </div>

        <!-- 卡片 4: 数据统计 -->
        <div class="glass-card">
            <div class="icon">📈</div>
            <h2>数据统计</h2>
            <p>通过微妙的透明度和模糊效果，创造出轻盈、现代的视觉体验。</p>
            <div style="margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <span>会议记录</span>
                    <span style="color: #FFB347;">+28%</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                    <span>知识文档</span>
                    <span style="color: #67C23A;">+45%</span>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span>任务完成率</span>
                    <span style="color: #FF7A5C;">92%</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 卡片鼠标跟随效果
        document.querySelectorAll('.glass-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                card.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.25))`;
            });

            card.addEventListener('mouseleave', () => {
                card.style.background = 'rgba(255, 255, 255, 0.25)';
            });
        });

        // 进度条动画
        setTimeout(() => {
            document.querySelector('.bar').style.width = '75%';
        }, 500);
    </script>
</body>
</html>
