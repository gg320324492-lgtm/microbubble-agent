# FRP 客户端配置 - 部署在本地电脑
serverAddr = "agent.mnb-lab.cn"
serverPort = 7000

# 认证（必须与服务端一致）
auth.method = "token"
auth.token = "microbubble-frp-2026"

# 日志
log.to = "./frpc.log"
log.level = "info"
log.maxDays = 7

# 代理规则：将本地 8000 端口映射到云服务器
[[proxies]]
name = "microbubble-app"
type = "tcp"
localIP = "127.0.0.1"
localPort = 8000
remotePort = 8000

[[proxies]]
name = "minio"
type = "tcp"
localIP = "127.0.0.1"
localPort = 9000
remotePort = 9000

# ssh 代理已删除 (2026-07-02) - 本机不开 SSH server 该代理永远连不上
# 如未来需要从云服务器 SSH 进本地电脑，先在本机启用 sshd 服务并开放 22 端口，再恢复本块
