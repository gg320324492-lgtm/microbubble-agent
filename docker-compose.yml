version: '3.8'

services:
  # 主应用
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # PostgreSQL数据库
  db:
    image: postgres:16-alpine
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: microbubble
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microbubble2026}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # MinIO对象存储
  minio:
    image: minio/minio
    volumes:
      - ./data/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio2026secure}
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Whisper语音识别服务 (CPU模式)
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_SIZE=${WHISPER_MODEL_SIZE:-base}
      - DEVICE=cpu
    restart: unless-stopped

  # Celery Worker (异步任务)
  celery-worker:
    build: .
    command: celery -A app.core.celery worker --loglevel=info
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped

  # Celery Beat (定时任务)
  celery-beat:
    build: .
    command: celery -A app.core.celery beat --loglevel=info
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    depends_on:
      - db
      - redis
    restart: unless-stopped
