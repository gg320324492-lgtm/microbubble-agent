services:
  # Nginx 反向代理 + 前端静态文件
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./web/dist:/usr/share/nginx/html:ro
    depends_on:
      - app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 主应用
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models/hf_cache:/root/.cache/huggingface
      - ./models/torch_hub:/root/.cache/torch/hub
      - ./models/modelscope:/root/.cache/modelscope
      # 2026-06-27 P2-2: alembic 挂载 (新迁移即时生效无需 rebuild 25GB 镜像)
      - ./alembic/versions:/app/alembic/versions
    env_file:
      - .env
    environment:
      - HF_ENDPOINT=${HF_ENDPOINT:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=microbubble2024
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-shibing624/text2vec-base-chinese}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-auto}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-64}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # PostgreSQL数据库
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: microbubble
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microbubble2026}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    restart: unless-stopped

  # Redis缓存
  redis:
    image: redis:7-alpine
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    restart: unless-stopped

  # Neo4j 图数据库（知识图谱）
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Web UI
      - "7687:7687"   # Bolt 协议
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/microbubble2024
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=256m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 1g
    restart: unless-stopped

  # MinIO对象存储
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio2026secure}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    mem_limit: 256m
    restart: unless-stopped

  # ⚠️ Whisper 退役 (2026-06-30 ASR 迁移到 SenseVoice)
  # 保留 Dockerfile.whisper / whisper_entrypoint.sh / whisper_server.py 作为紧急回滚路径
  # 启动回滚: docker compose up -d whisper (前提: GPU 显存充足 8 GB)
  # 配置文件保留: app/config.py WHISPER_* / app/voice/asr.py 注释掉的 fallback 逻辑
  # 详见 plan: woolly-pondering-muffin.md (CLAUDE.md 顶部任务链)
  #
  # whisper:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.whisper
  #   volumes:
  #     - ./models:/app/models
  #     - ./models/hf_cache:/root/.cache/huggingface
  #     - ./whisper_entrypoint.sh:/app/entrypoint.sh
  #     - ./app/whisper_server.py:/app/whisper_server.py:ro
  #   entrypoint: ["bash", "/app/entrypoint.sh"]
  #   environment:
  #     - MODEL_SIZE=${WHISPER_MODEL_SIZE:-large-v3}
  #     - DEVICE=${WHISPER_DEVICE:-cuda}
  #     - HF_ENDPOINT=${HF_ENDPOINT:-}
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [gpu]
  #   mem_limit: 4g
  #   restart: unless-stopped

  # 2026-06-30 ASR 迁移: SenseVoice 服务 (唯一 ASR 后端, 单模型策略)
  # 内存占用 ~1 GB (vs Whisper 8 GB), RTF 0.001 (1000× real-time)
  # 长音频自动 chunked (60s × N, cache={}) 避免 OOM
  # 长会议 (>= 10 min) 自动 fallback 到 Whisper (见 app/voice/asr.py 路由层)
  sensevoice:
    build:
      context: .
      dockerfile: Dockerfile.funasr
    volumes:
      - ./models:/app/models
      - ./models/hf_cache:/root/.cache/huggingface
      - ./models/modelscope:/root/.cache/modelscope
      - ./funasr_entrypoint.sh:/app/entrypoint.sh
      # bind mount 源码 → 修改本地 sensevoice_server.py 后 docker compose restart 即可生效
      - ./app/sensevoice_server.py:/app/sensevoice_server.py:ro
    entrypoint: ["bash", "/app/entrypoint.sh"]
    environment:
      - MODEL=${SENSEVOICE_MODEL:-iic/SenseVoiceSmall}
      - DEVICE=${SENSEVOICE_DEVICE:-cuda}
      - DEFAULT_BATCH_SIZE_S=${SENSEVOICE_BATCH_SIZE_S:-60}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    mem_limit: 4g
    restart: unless-stopped

  # Celery Worker (异步任务)
  celery-worker:
    build: .
    # 使用 solo pool 避免 prefork 子进程保留旧代码快照。
    # 本项目的重任务主要受 GPU/模型限制，单 worker 更符合本地开发和线上稳定性；
    # 代码改动后 docker compose restart celery-worker 即可重新加载。
    command: celery -A app.core.celery worker --loglevel=info --pool=solo
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models/hf_cache:/root/.cache/huggingface
      - ./models/torch_hub:/root/.cache/torch/hub
      - ./models/modelscope:/root/.cache/modelscope
      # 2026-06-19 Phase 7: alembic 迁移挂载（celery 也可能跑迁移相关任务）
      - ./alembic/versions:/app/alembic/versions
    env_file:
      - .env
    environment:
      - HF_ENDPOINT=${HF_ENDPOINT:-}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=microbubble2024
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-shibing624/text2vec-base-chinese}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-auto}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-64}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 4g
    restart: unless-stopped

  # Celery Beat (定时任务)
  celery-beat:
    build: .
    command: celery -A app.core.celery beat --loglevel=info
    volumes:
      # 2026-06-03 修复：之前 beat 容器没有 ./app 挂载，导致新增的 Celery 任务
      # (如 auto_purge_trash) 修改代码后 beat 仍加载旧 schedule，必须 rebuild
      # 25GB 镜像才能生效。补上 volume 与 worker 一致，代码改动即时生效。
      - ./app:/app/app
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models/hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - HF_ENDPOINT=${HF_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 128m
    restart: unless-stopped

  # Vision MCP Server
  vision-mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    # MCP stdio 服务器默认 stdin 会被 Docker 关闭 → 进程退出 → restart 死循环
    # 必须 stdin_open + tty 保持 stdio 开放，等待 MCP 客户端连接
    stdin_open: true
    tty: true
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLAUDE_BASE_URL=${CLAUDE_BASE_URL}
      - VISION_MODEL=${VISION_MODEL:-mimo-v2.5}
    env_file:
      - .env
    mem_limit: 512m
    restart: unless-stopped
